<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<title>Watpanya Meditation Retreat App</title>
<style>
  html, body { margin: 0; padding: 0; background: #EFEAD9; }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap');

  #panya-root {
    --bg: #EFEAD9;
    --bg-alt: #E5DCC0;
    --panel: #FBF8EF;
    --ink: #24261F;
    --ink-soft: #55584B;
    --teal: #1B3A34;
    --teal-light: #2C554D;
    --gold: #A9812F;
    --gold-bright: #C9A227;
    --saffron: #E08E2F;
    --line: rgba(27,58,52,0.18);
    --danger: #A8432F;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow: 0 6px 22px rgba(27,58,52,.07);
    --shadow-btn: 0 4px 14px rgba(27,58,52,.22);
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink);
    background: var(--bg);
    min-height: 100%;
    padding: 0;
    box-sizing: border-box;
    -webkit-text-size-adjust: 100%;
  }
  #panya-root * { box-sizing: border-box; }
  #panya-root h1, #panya-root h2, #panya-root h3, #panya-root .display { font-family: 'Noto Serif Thai', serif; }

  .pr-shell { max-width: 820px; margin: 0 auto; padding: 26px 16px 60px; }
  .pr-header { text-align: center; margin-bottom: 22px; }
  .pr-header .arch-wrap { display: flex; justify-content: center; margin-bottom: 8px; }
  .pr-header h1 { font-size: clamp(20px, 5.4vw, 27px); font-weight: 700; color: var(--teal); margin: 4px 0 4px; letter-spacing: .2px; line-height: 1.25; }
  .pr-header p { font-size: 14.5px; color: var(--ink-soft); margin: 0; line-height: 1.5; }
  .pr-header .app-sub { margin-top: 2px; }

  .contact-footer { text-align: center; margin: 22px 0 6px; padding-top: 16px; border-top: 1px dashed var(--line); }
  .contact-title { font-size: 13px; color: var(--ink-soft); margin-bottom: 10px; letter-spacing: .04em; }
  .contact-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .contact-chip { display: inline-flex; align-items: center; font-size: 14.5px; font-weight: 600; color: var(--teal); background: var(--bg-alt); border: 1px solid var(--line); border-radius: 24px; padding: 10px 18px; text-decoration: none; transition: all .15s ease; }
  .contact-chip:hover { border-color: var(--gold-bright); color: var(--teal-light); box-shadow: 0 3px 10px rgba(27,58,52,.1); transform: translateY(-1px); }

  .course-select-btn { margin-top: 6px; width: 100%; background: linear-gradient(135deg, var(--teal), var(--teal-light)); color: #fff; border: none; border-radius: var(--radius-sm); padding: 15px 18px; font-family: 'Noto Sans Thai', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: var(--shadow-btn); transition: transform .15s ease, box-shadow .15s ease, background .2s ease; letter-spacing: .2px; }
  .course-select-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(27,58,52,.3); background: linear-gradient(135deg, var(--saffron), var(--gold-bright)); }
  .course-select-btn:active { transform: translateY(0); }

  .pr-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 22px; margin-bottom: 16px; position: relative; box-shadow: var(--shadow); }
  .pr-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius) var(--radius) 0 0; background: linear-gradient(90deg, var(--gold-bright), var(--saffron)); }

  .course-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 620px) { .course-grid { grid-template-columns: 1fr 1fr; } }
  .course-pick { background: var(--panel); border: 1px solid var(--line); border-top: 3px solid var(--gold-bright); border-radius: var(--radius); padding: 20px 18px; text-align: left; transition: box-shadow .15s ease, border-color .15s ease; display: flex; flex-direction: column; gap: 9px; color: var(--ink); box-shadow: var(--shadow); }
  .course-pick:hover { box-shadow: 0 10px 26px rgba(27,58,52,.14); border-top-color: var(--saffron); }
  .course-pick .tag { font-size: 11.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); font-weight: 700; }
  .course-pick h3 { font-size: 18.5px; margin: 2px 0; color: var(--teal); line-height: 1.35; }
  .course-pick .sub { font-size: 13.5px; color: var(--ink-soft); line-height: 1.55; }
  .course-pick .cta { margin-top: 8px; font-size: 13px; font-weight: 600; color: var(--teal-light); }

  .pr-progress .step-label { text-align:center; font-size: 13.5px; color: var(--ink-soft); margin-top: 8px; }

  .pr-field { margin-bottom: 17px; }
  .pr-field label { display: block; font-size: 14.5px; font-weight: 700; color: var(--teal); margin-bottom: 7px; }
  .pr-field .hint { font-size: 12.5px; color: var(--ink-soft); margin-top: 5px; line-height: 1.5; }
  .pr-field input[type=text], .pr-field input[type=tel], .pr-field input[type=date], .pr-field input[type=number],
  .pr-field input[type=email], .pr-field input[type=password], .pr-field select, .pr-field textarea {
    width: 100%; padding: 13px 14px; border: 1.5px solid var(--line); border-radius: var(--radius-sm);
    background: #fff; font-family: 'Noto Sans Thai', sans-serif; font-size: 16px; color: var(--ink); line-height: 1.4;
  }
  .pr-field select { -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9' viewBox='0 0 14 9'><path d='M1 1l6 6 6-6' fill='none' stroke='%231B3A34' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>"); background-repeat: no-repeat; background-position: right 14px center; padding-right: 38px; }
  .pr-field input:focus, .pr-field select:focus, .pr-field textarea:focus { outline: none; border-color: var(--gold-bright); box-shadow: 0 0 0 3px rgba(201,162,39,.18); }
  .pr-row { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 560px) { .pr-row.two { grid-template-columns: 1fr 1fr; } .pr-row.three { grid-template-columns: 1fr 1fr 1fr; } }

  .radio-group, .choice-list { display: flex; flex-direction: column; gap: 9px; }
  .choice-item { border: 1.5px solid var(--line); border-radius: var(--radius-sm); padding: 13px 14px; display: flex; align-items: center; gap: 11px; cursor: pointer; font-size: 15px; background: #fff; transition: all .15s ease; }
  .choice-item.selected { border-color: var(--gold-bright); background: #FBF3DE; }
  .choice-item.is-closed { opacity: .55; }
  .choice-item input { accent-color: var(--teal); width: 18px; height: 18px; flex-shrink: 0; }
  .choice-item .meta { margin-left: auto; font-size: 12.5px; color: var(--saffron); font-weight: 700; white-space: nowrap; }

  .pr-actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
  .btn { font-family: 'Noto Sans Thai', sans-serif; font-size: 15px; font-weight: 700; padding: 13px 22px; border-radius: var(--radius-sm); border: 1.5px solid transparent; cursor: pointer; transition: transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease; letter-spacing: .2px; }
  .btn-primary { background: linear-gradient(135deg, var(--teal), var(--teal-light)); color: #fff; box-shadow: var(--shadow-btn); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 7px 18px rgba(27,58,52,.3); }
  .btn-primary:active { transform: translateY(0); }
  .btn-ghost { background: #fff; color: var(--teal); border-color: var(--line); }
  .btn-ghost:hover { border-color: var(--teal); box-shadow: 0 3px 10px rgba(27,58,52,.08); }
  .btn-danger { background: #fff; color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 9px 15px; font-size: 13.5px; border-radius: 9px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  .review-table { width: 100%; border-collapse: collapse; font-size: 14.5px; }
  .review-table td { padding: 8px 4px; border-bottom: 1px dashed var(--line); vertical-align: top; }
  .review-table td.k { color: var(--ink-soft); width: 40%; }
  .review-table td.v { font-weight: 500; }

  .accept-box { display:flex; gap:10px; align-items:flex-start; background:#FBF3DE; border:1px solid var(--gold-bright); border-radius:var(--radius-sm); padding:14px 16px; font-size:14px; line-height:1.65; }
  .accept-box input { margin-top: 3px; accent-color: var(--teal); width: 18px; height: 18px; flex-shrink: 0; }

  .success-wrap { text-align: center; padding: 20px 6px; }
  .success-wrap .ref { font-family: 'Noto Serif Thai', serif; font-size: 22px; color: var(--teal); margin: 10px 0; letter-spacing: .5px; }
  .success-wrap .box { background: var(--bg-alt); border-radius: var(--radius-sm); padding: 16px; margin: 16px 0; text-align: left; font-size: 14.5px; line-height: 1.75; }

  .footer-note { text-align: center; margin-top: 26px; font-size: 13.5px; color: var(--ink-soft); }
  .footer-note button { background:none;border:none;color:var(--teal-light); text-decoration:underline; cursor:pointer; font-size:13.5px; font-family:'Noto Sans Thai',sans-serif; padding: 4px; }

  .err-banner { background: #FBE6E0; border: 1px solid var(--danger); color: var(--danger); font-size: 14px; padding: 12px 14px; border-radius: var(--radius-sm); margin-bottom: 14px; line-height: 1.5; }
  .ok-banner { background: #E7F1E4; border: 1px solid #4C8C5B; color: #2C5C36; font-size: 14px; padding: 12px 14px; border-radius: var(--radius-sm); margin-bottom: 14px; line-height: 1.5; }

  .admin-gate { max-width: 340px; margin: 30px auto; text-align: center; }
  .admin-table-wrap { overflow-x: auto; }
  table.admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.admin-table th, table.admin-table td { padding: 9px 10px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
  table.admin-table th { color: var(--teal); font-weight: 700; background: var(--bg-alt); position: sticky; top: 0; }
  .id-mask { cursor: pointer; color: var(--gold); text-decoration: underline dotted; }
  .empty-state { text-align: center; padding: 40px 10px; color: var(--ink-soft); font-size: 15px; }
  .spinner-line { text-align:center; padding: 30px; color: var(--ink-soft); font-size: 14.5px; }
  .admin-toolbar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 14px; align-items:center; justify-content: space-between; }
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; border-bottom: 1px solid var(--line); overflow-x: auto; }
  .tab-btn { padding: 11px 18px; font-size: 14.5px; font-weight: 700; background: none; border: none; cursor: pointer; color: var(--ink-soft); border-bottom: 2px solid transparent; margin-bottom: -1px; font-family:'Noto Sans Thai',sans-serif; white-space: nowrap; }
  .tab-btn.active { color: var(--teal); border-bottom-color: var(--gold-bright); }
  .date-entry { border: 1.5px solid var(--line); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 9px; display: grid; grid-template-columns: 1fr; gap: 9px; background: #fff; }
  @media (min-width: 680px) { .date-entry { grid-template-columns: 2.2fr 1fr .8fr auto; align-items: center; } }
  .date-entry input[type=text], .date-entry input[type=number] { padding: 9px 11px; font-size: 14px; border: 1.5px solid var(--line); border-radius: 8px; }
  .date-entry .flags { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 700; }
  .badge-special { background: #FBF3DE; color: var(--gold); }
  .badge-closed { background: #FBE6E0; color: var(--danger); }
  .course-sub-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; }
  .role-pill { display:inline-block; font-size: 11.5px; padding: 4px 12px; border-radius: 12px; background: var(--bg-alt); color: var(--teal); font-weight: 700; margin-left: 8px; }

  @media (max-width: 420px) {
    .pr-shell { padding: 18px 12px 50px; }
    .pr-card { padding: 18px 15px; }
    .btn { width: 100%; }
    .pr-actions { flex-direction: column-reverse; }
    .pr-actions .btn { width: 100%; }
    .admin-toolbar .btn { width: auto; }
  }
</style>
</head>

<div id="panya-root" style="min-height:100vh;">
  <div class="pr-shell" id="pr-shell">
    <div class="spinner-line">กำลังเตรียมใบสมัคร...</div>
  </div>
</div>

  // ---------- date helpers ----------
  function isoDate(d){ return d.toISOString().slice(0,10); }
  function toBuddhistYear(d){ return d.getFullYear() + 543; }
  function formatRangeThai(fri, sun){
    var fD = fri.getDate(), sD = sun.getDate();
    var fM = THAI_MONTHS[fri.getMonth()], sM = THAI_MONTHS[sun.getMonth()];
    var fY = toBuddhistYear(fri), sY = toBuddhistYear(sun);
    if (fM === sM && fY === sY) return 'วันที่ ' + fD + ' - ' + sD + ' ' + fM + ' ' + fY;
    if (fY === sY) return 'วันที่ ' + fD + ' ' + fM + ' - ' + sD + ' ' + sM + ' ' + fY;
    return 'วันที่ ' + fD + ' ' + fM + ' ' + fY + ' - ' + sD + ' ' + sM + ' ' + sY;
  }
  function nextFridayFrom(from){
    var d = new Date(from); d.setHours(0,0,0,0);
    var day = d.getDay();
    var diff = (5 - day + 7) % 7;
    d.setDate(d.getDate() + diff);
    return d;
  }
  function generateWeeklyEntries(startFri, count){
    var arr = [];
    for (var i=0;i<count;i++){
      var f = new Date(startFri); f.setDate(f.getDate() + i*7);
      var s = new Date(f); s.setDate(s.getDate()+2);
      arr.push({ id: 'w-' + isoDate(f), label: formatRangeThai(f, s), closed:false, capacity:null, used:0, special:false });
    }
    return arr;
  }

    ];
    return specs.map(function(s, i){
      return { id: 'r-' + (i+1), label: 'รุ่นที่ ' + (i+1) + ' (' + s[0] + ')', closed:false, capacity:60, used:0, special:false };
    });
  }

  async function ensureDateConfig(courseId){
    if (state.dateConfigs[courseId]) return state.dateConfigs[courseId];
    var key = 'config:' + courseId + '-dates';
    try {
      var res = await window.storage.get(key, true);
      if (res && res.value){
        state.dateConfigs[courseId] = JSON.parse(res.value);
        return state.dateConfigs[courseId];
      }
    } catch(e){}
    var initial = courseId === '3day' ? generateWeeklyEntries(nextFridayFrom(new Date()), 12) : defaultRounds5day();
    try { await window.storage.set(key, JSON.stringify(initial), true); } catch(e){}
    state.dateConfigs[courseId] = initial;
    return initial;
  }
  async function refreshDateConfig(courseId){
    var key = 'config:' + courseId + '-dates';
    try {
      var res = await window.storage.get(key, true);
      state.dateConfigs[courseId] = res && res.value ? JSON.parse(res.value) : (state.dateConfigs[courseId] || []);
    } catch(e){}
    return state.dateConfigs[courseId];
  }
  async function saveDateConfig(courseId, arr){
    state.dateConfigs[courseId] = arr;
    try { await window.storage.set('config:' + courseId + '-dates', JSON.stringify(arr), true); } catch(e){}
  }

  function findEntry(arr, id){
    for (var i=0;i<arr.length;i++) if (arr[i].id === id) return arr[i];
    return null;

  function seatsLeftText(entry){
    if (!entry) return '';
    if (entry.closed) return 'ปิดรับสมัคร';
    if (entry.capacity == null) return '';
    var left = Math.max(entry.capacity - (entry.used||0), 0);
    return left <= 0 ? 'เต็มแล้ว' : ('เหลือ ' + left + '/' + entry.capacity + ' ที่');
  }

  // ---------- svg helpers ----------
  function lotusSVG(activeIndex){
    var petals = 4, cx = 60, cy = 60, r = 46, parts = [];
    for (var i=0;i<petals;i++){
      var angle = (i / petals) * 360, filled = i <= activeIndex;
      parts.push('<g transform="rotate('+angle+' '+cx+' '+cy+')"><ellipse cx="'+cx+'" cy="'+(cy-r+16)+'" rx="15" ry="26" fill="'+(filled?'var(--gold-bright)':'#fff')+'" stroke="'+(filled?'var(--gold)':'var(--line)')+'" stroke-width="1.5"/></g>');
    }
    return '<svg width="120" height="120" viewBox="0 0 120 120" style="display:block;margin:0 auto;">' + parts.join('') + '<circle cx="'+cx+'" cy="'+cy+'" r="12" fill="var(--teal)"/></svg>';
  }

    return '<svg width="120" height="70" viewBox="0 0 120 70"><path d="M4 68 L4 40 Q4 6 60 6 Q116 6 116 40 L116 68" fill="none" stroke="var(--teal)" stroke-width="4"/><circle cx="60" cy="34" r="7" fill="var(--saffron)"/></svg>';
  }

  function dateSelectHTML(entries, selectedId, handlerName, allowFull){
    var options = '<option value="">-- กรุณาเลือกวัน/รุ่น --</option>';

      var labelText = entry.label + (entry.special ? ' (กรณีพิเศษ)' : '') + (seats ? ' — ' + seats : '');

    });

  async function loadAdminRows(){
    state.adminLoading = true; render();
    try {
      var listRes = await window.storage.list('application:', true);
      var keys = listRes && listRes.keys ? listRes.keys : [];
      var rows = [];
      for (var i=0;i<keys.length;i++){
        try { var r = await window.storage.get(keys[i], true); if (r && r.value) rows.push(JSON.parse(r.value)); } catch(e){}
      }
      rows.sort(function(a,b){ return (b.submittedAt||0) - (a.submittedAt||0); });
      state.adminRows = rows;
    } catch(e){ state.adminRows = []; }
    state.adminLoading = false; render();
  }

        '<td>'+esc(row.refId||'-')+'</td>' +
        '<td><button class="btn btn-ghost btn-sm" onclick="PanyaApp.openEditApplicant(\''+esc(row.refId)+'\')">แก้ไข</button> ' +
        '<button class="btn btn-danger btn-sm" onclick="PanyaApp.deleteApplicant(\''+esc(row.refId)+'\')">ลบ</button></td>' +
        '</tr>';
    });
    html += '</tbody></table></div>';
    return html;
  }

  function renderDateManager(){
    var courseId = state.dateManageCourse;
    var entries = state.dateConfigs[courseId] || [];
    var html = '<div class="course-sub-tabs">';
    Object.keys(COURSES).forEach(function(k){
      html += '<button class="tab-btn '+(courseId===k?'active':'')+'" onclick="PanyaApp.setDateManageCourse(\''+k+'\')">'+esc(COURSES[k].title)+'</button>';
    });
    html += '</div>';
    if (state.error) html += '<div class="err-banner">'+esc(state.error)+'</div>';
    if (state.ok) html += '<div class="ok-banner">'+esc(state.ok)+'</div>';

    entries.forEach(function(entry){
      html += '<div class="date-entry">' +
        '<input type="text" value="'+esc(entry.label)+'" onchange="PanyaApp.updateDateEntry(\''+entry.id+'\', \'label\', this.value)">' +
        '<input type="number" min="0" placeholder="ไม่จำกัด" value="'+(entry.capacity==null?'':entry.capacity)+'" onchange="PanyaApp.updateDateEntry(\''+entry.id+'\', \'capacity\', this.value)">' +
        '<div class="flags"><label><input type="checkbox" '+(entry.closed?'checked':'')+' onchange="PanyaApp.updateDateEntry(\''+entry.id+'\', \'closed\', this.checked)"> ปิดรับ</label></div>' +
        '<div style="display:flex;gap:6px;align-items:center;">' +
        '<span class="hint">ใช้ไป '+ (entry.used||0) + (entry.capacity!=null?('/'+entry.capacity):'') +'</span>' +
        '<button class="btn btn-danger btn-sm" onclick="PanyaApp.deleteDateEntry(\''+entry.id+'\')">ลบ</button>' +
        '</div></div>';
    });

    html += '<div class="pr-card" style="background:var(--bg-alt);box-shadow:none;">';
    html += '<div style="font-weight:700;color:var(--teal);margin-bottom:8px;font-size:13.5px;">เพิ่มวันที่กรณีพิเศษ</div>';
    html += '<div class="pr-row two">' +
      '<div class="pr-field" style="margin-bottom:8px;"><input type="text" id="newDateLabel" placeholder="เช่น วันที่ 15-17 สิงหาคม 2569 (กรณีพิเศษวันแม่)"></div>' +
      '<div class="pr-field" style="margin-bottom:8px;"><input type="number" id="newDateCapacity" placeholder="จำกัดจำนวน (เว้นว่าง = ไม่จำกัด)"></div>' +
      '</div>';
    html += '<button class="btn btn-primary btn-sm" onclick="PanyaApp.addSpecialDate()">+ เพิ่มวันที่พิเศษ</button>';
    if (courseId === '3day'){
      html += ' <button class="btn btn-ghost btn-sm" onclick="PanyaApp.extendWeeklyDates()">+ เพิ่มรอบสัปดาห์ถัดไปอีก 8 สัปดาห์</button>';
    }
    html += '</div>';
    return html;
  }

  function renderAdminEdit(){
    var course = COURSES[state.editing.courseId];
    var entries = state.dateConfigs[state.editing.courseId] || [];
    var d = state.editing;
    var html = renderHeader();
    html += '<div class="pr-card">';
    html += '<h3 style="color:var(--teal);">'+(d._isNew?'เพิ่มผู้สมัครใหม่':'แก้ไขข้อมูลผู้สมัคร')+'</h3>';
    if (state.error) html += '<div class="err-banner">'+esc(state.error)+'</div>';
    if (d._isNew){
      html += '<div class="pr-field"><label>หลักสูตร *</label><select onchange="PanyaApp.setEditCourse(this.value)">' +
        Object.keys(COURSES).map(function(k){ return '<option value="'+k+'" '+(d.courseId===k?'selected':'')+'>'+esc(COURSES[k].fullName)+'</option>'; }).join('') + '</select></div>';
    }
    html += '<form id="prEditForm">';
    html += '<div class="pr-field"><label>วัน/รุ่นที่สมัคร *</label>'+dateSelectHTML(entries, d.dateId, 'PanyaApp.setEditDateChoice', true)+'</div>';
    html += fieldsForStep(1, course, d, entries).replace(/PanyaApp\.setField/g, 'PanyaApp.setEditField');
    html += fieldsForStep(2, course, d, entries).replace(/PanyaApp\.setField/g, 'PanyaApp.setEditField');
    html += '<div class="pr-field"><label>อีเมล</label><input type="email" value="'+esc(d.email||'')+'" oninput="PanyaApp.setEditField(\'email\', this.value)"></div>';
    html += '</form>';
    html += '<div class="pr-actions">' +
      '<button type="button" class="btn btn-ghost" onclick="PanyaApp.cancelEdit()">&larr; ยกเลิก</button>' +
      '<button type="button" class="btn btn-primary" onclick="PanyaApp.saveApplicant()">บันทึกข้อมูล</button>' +
      '</div>';
    html += '</div>';
    root.innerHTML = html;
  }

  window.PanyaApp = {
    pickCourse: async function(key){
      state.course = key; state.step = 0; state.data = {}; state.error = '';
      state.screen = 'form';
      await ensureDateConfig(key);
      render();
    },
    setField: function(key, val){ state.data[key] = val; },
    setDateChoice: function(id){ state.data.dateId = id; },
    back: function(){
      state.error = '';
      if (state.step === 0){ state.screen = 'select'; state.course = null; } else { state.step -= 1; }
      render();
    },
    next: async function(){
      var form = document.getElementById('prStepForm');
      if (form && !form.reportValidity()) return;
      state.error = '';
      if (state.step === 0){
        await refreshDateConfig(state.course);
        var entry = findEntry(state.dateConfigs[state.course], state.data.dateId);
        if (!entry || entry.closed || seatsLeftText(entry) === 'เต็มแล้ว'){
          state.error = 'รอบที่เลือกเต็มแล้วหรือปิดรับสมัคร กรุณาเลือกรอบอื่น';
          render(); return;
        }
      }
      state.step += 1; render();
    },
    submit: async function(){
      if (state.submitting) return;
      state.submitting = true; state.error = ''; render();
      try {
        var course = COURSES[state.course];
        var entries = await refreshDateConfig(state.course);
        var entry = findEntry(entries, state.data.dateId);
        if (!entry || entry.closed || seatsLeftText(entry) === 'เต็มแล้ว'){
          state.error = 'ขออภัย รอบนี้เต็มหรือปิดรับสมัครระหว่างที่ท่านกรอกข้อมูล กรุณาย้อนกลับไปเลือกรอบอื่น';
          state.submitting = false; render(); return;
        }
        entry.used = (entry.used||0) + 1;
        await saveDateConfig(state.course, entries);
        var now = Date.now();
        var refId = course.id.toUpperCase() + '-' + now.toString(36).toUpperCase();
        var record = Object.assign({}, state.data, {
          courseId: course.id, courseTitle: course.fullName, dateLabel: entry.label,
          refId: refId, submittedAt: now, submittedAtLabel: new Date(now).toLocaleString('th-TH')
        });
        var res = await window.storage.set('application:' + refId, JSON.stringify(record), true);
        if (!res) throw new Error('save failed');
        state.refId = refId; state.screen = 'success';
      } catch(e){ state.error = 'เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่อีกครั้ง'; }
      state.submitting = false; render();
    },
    reset: function(){
      state = Object.assign(state, { screen:'select', course:null, step:0, data:{}, error:'', ok:'', adminRole:null, adminTab:'list', editing:null, selfRecord:null, selfMode:'view', selfNewDateId:null, selfRefIdInput:'', selfPhoneInput:'' });
      render();
    },
    goSelfService: function(){
      state.screen = 'self-lookup'; state.error=''; state.ok=''; render();
    },
    lookupSelf: async function(){
      var refInp = document.getElementById('selfRefId');
      var phoneInp = document.getElementById('selfPhone');
      var refId = refInp ? refInp.value.trim().toUpperCase() : '';
      var phone = phoneInp ? phoneInp.value.trim() : '';
      state.selfRefIdInput = refId; state.selfPhoneInput = phone;
      if (!refId || !phone){ state.error = 'กรุณากรอกหมายเลขอ้างอิงและเบอร์โทรศัพท์ให้ครบ'; render(); return; }
      try {
        var res = await window.storage.get('application:' + refId, true);
        if (!res || !res.value){ state.error = 'ไม่พบใบสมัครตามหมายเลขอ้างอิงนี้'; render(); return; }
        var record = JSON.parse(res.value);
        var normalize = function(s){ return String(s||'').replace(/[^0-9]/g,''); };
        if (normalize(record.phone) !== normalize(phone)){
          state.error = 'เบอร์โทรศัพท์ไม่ตรงกับที่ใช้สมัครไว้'; render(); return;
        }
        await ensureDateConfig(record.courseId);
        state.selfRecord = record; state.selfMode = 'view'; state.selfNewDateId = null;
        state.error=''; state.screen = 'self-action'; render();
      } catch(e){ state.error = 'เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง'; render(); }
    },
    openSelfReschedule: function(){ state.selfMode = 'reschedule'; state.selfNewDateId = null; state.error=''; render(); },
    cancelSelfReschedule: function(){ state.selfMode = 'view'; state.error=''; render(); },
    setSelfNewDate: function(id){ state.selfNewDateId = id; },
    confirmSelfReschedule: async function(){
      if (!state.selfNewDateId){ state.error = 'กรุณาเลือกวัน/รุ่นใหม่ที่ต้องการเลื่อนไป'; render(); return; }
      var r = state.selfRecord;
      try {
        var entries = await refreshDateConfig(r.courseId);
        var newEntry = findEntry(entries, state.selfNewDateId);
        if (!newEntry || newEntry.closed || seatsLeftText(newEntry) === 'เต็มแล้ว'){
          state.error = 'รอบที่เลือกเต็มหรือปิดรับสมัครแล้ว กรุณาเลือกรอบอื่น'; render(); return;
        }
        var oldEntry = findEntry(entries, r.dateId);
        if (oldEntry) oldEntry.used = Math.max(0, (oldEntry.used||0) - 1);
        newEntry.used = (newEntry.used||0) + 1;
        await saveDateConfig(r.courseId, entries);
        var updated = Object.assign({}, r, { dateId: newEntry.id, dateLabel: newEntry.label });
        await window.storage.set('application:' + r.refId, JSON.stringify(updated), true);
        state.selfRecord = updated; state.selfMode = 'view'; state.error='';
        state.ok = 'เลื่อนวันที่ปฏิบัติธรรมเรียบร้อยแล้ว เป็น: ' + newEntry.label;
        render();
      } catch(e){ state.error = 'บันทึกไม่สำเร็จ กรุณาลองใหม่อีกครั้ง'; render(); }
    },
    selfCancel: async function(){
      if (!confirm('ยืนยันการยกเลิกใบสมัครนี้? การยกเลิกไม่สามารถกู้คืนได้')) return;
      var r = state.selfRecord;
      try {
        var entries = await refreshDateConfig(r.courseId);
        var entry = findEntry(entries, r.dateId);
        if (entry){ entry.used = Math.max(0, (entry.used||0) - 1); await saveDateConfig(r.courseId, entries); }
        await window.storage.delete('application:' + r.refId, true);
        state.selfRecord = null; state.screen = 'select'; state.error='';
        state.ok = '';
        alert('ยกเลิกใบสมัครหมายเลข ' + r.refId + ' เรียบร้อยแล้ว');
        render();
      } catch(e){ state.error = 'ยกเลิกไม่สำเร็จ กรุณาลองใหม่อีกครั้ง'; render(); }
    },
    goAdminGate: function(){ state.screen = 'admin-gate'; state.error = ''; render(); },
    checkAdminCode: function(){
      var inp = document.getElementById('adminCodeInput');
      var val = inp ? inp.value : '';
      if (val === SUPER_CODE || val === VIEW_CODE){
        state.adminRole = val === SUPER_CODE ? 'super' : 'view';
        state.screen = 'admin';
        Promise.all([ensureDateConfig('3day'), ensureDateConfig('5day')]).then(loadAdminRows);
      } else {
        state.error = 'รหัสผ่านไม่ถูกต้อง'; render();
      }
    },
    setAdminTab: function(tab){ state.adminTab = tab; state.error=''; state.ok=''; render(); },
    setDateManageCourse: function(c){ state.dateManageCourse = c; state.error=''; state.ok=''; render(); },
    refreshAdmin: function(){ loadAdminRows(); },
    toggleReveal: function(idx){ state.revealedIds[idx] = !state.revealedIds[idx]; render(); },

    updateDateEntry: async function(id, field, val){
      var courseId = state.dateManageCourse;
      var entries = state.dateConfigs[courseId] || [];
      var entry = findEntry(entries, id);
      if (!entry) return;
      if (field === 'capacity') entry.capacity = val === '' ? null : Math.max(0, parseInt(val,10)||0);
      else if (field === 'closed') entry.closed = !!val;
      else entry.label = val;
      await saveDateConfig(courseId, entries);
      state.ok = 'บันทึกแล้ว'; state.error=''; render();
    },
    deleteDateEntry: async function(id){
      if (!confirm('ยืนยันการลบวันที่นี้? (จะไม่กระทบผู้ที่สมัครไปแล้ว)')) return;
      var courseId = state.dateManageCourse;
      var entries = (state.dateConfigs[courseId] || []).filter(function(e){ return e.id !== id; });
      await saveDateConfig(courseId, entries);
      state.ok = 'ลบแล้ว'; render();
    },
    addSpecialDate: async function(){
      var labelInp = document.getElementById('newDateLabel');
      var capInp = document.getElementById('newDateCapacity');
      var label = labelInp ? labelInp.value.trim() : '';
      if (!label){ state.error = 'กรุณาระบุข้อความวันที่'; render(); return; }
      var cap = capInp && capInp.value !== '' ? Math.max(0, parseInt(capInp.value,10)||0) : null;
      var courseId = state.dateManageCourse;
      var entries = state.dateConfigs[courseId] || [];
      entries.push({ id: 'sp-' + Date.now().toString(36), label: label, closed:false, capacity: cap, used:0, special:true });
      await saveDateConfig(courseId, entries);
      state.error=''; state.ok = 'เพิ่มวันที่พิเศษแล้ว'; render();
    },
    extendWeeklyDates: async function(){
      var entries = state.dateConfigs['3day'] || [];
      var weekly = entries.filter(function(e){ return e.id.indexOf('w-') === 0; });
      var lastDate = weekly.length ? new Date(weekly[weekly.length-1].id.slice(2)) : nextFridayFrom(new Date());
      var startNext = new Date(lastDate); startNext.setDate(startNext.getDate() + 7);
      var more = generateWeeklyEntries(startNext, 8);
      var merged = entries.concat(more);
      await saveDateConfig('3day', merged);
      state.ok = 'เพิ่มรอบสัปดาห์ถัดไปอีก 8 สัปดาห์แล้ว'; render();
    },

    openAddApplicant: function(){
      state.editing = { _isNew: true, courseId: '3day', hasCondition: 'no' };
      state.error=''; state.screen = 'admin-edit'; render();
    },
    openEditApplicant: function(refId){
      var row = state.adminRows.filter(function(r){ return r.refId === refId; })[0];
      if (!row) return;
      state.editing = Object.assign({}, row, { _isNew:false, _originalRefId: refId, _originalDateId: row.dateId });
      state.error=''; state.screen = 'admin-edit'; render();
    },
    setEditField: function(key, val){ state.editing[key] = val; },
    setEditDateChoice: function(id){ state.editing.dateId = id; },
    setEditCourse: function(courseId){
      state.editing.courseId = courseId; state.editing.dateId = null;
      ensureDateConfig(courseId).then(render);
    },
    cancelEdit: function(){ state.editing = null; state.screen = 'admin'; render(); },
    saveApplicant: async function(){
      var form = document.getElementById('prEditForm');
      if (form && !form.reportValidity()) return;
      var d = state.editing;
      if (!d.dateId){ state.error = 'กรุณาเลือกวัน/รุ่นที่สมัคร'; render(); return; }
      var courseId = d.courseId;
      var entries = await refreshDateConfig(courseId);
      var newEntry = findEntry(entries, d.dateId);
      if (!newEntry){ state.error = 'ไม่พบวันที่ที่เลือก'; render(); return; }

      if (!d._isNew && d._originalDateId && d._originalDateId !== d.dateId){
        var oldEntry = findEntry(entries, d._originalDateId);
        if (oldEntry) oldEntry.used = Math.max(0, (oldEntry.used||0) - 1);
        newEntry.used = (newEntry.used||0) + 1;
        await saveDateConfig(courseId, entries);
      } else if (d._isNew){
        newEntry.used = (newEntry.used||0) + 1;
        await saveDateConfig(courseId, entries);
      }

      var refId = d._isNew ? (courseId.toUpperCase() + '-' + Date.now().toString(36).toUpperCase()) : d.refId;
      var now = d._isNew ? Date.now() : (d.submittedAt || Date.now());
      var record = Object.assign({}, d, {
        courseId: courseId, courseTitle: COURSES[courseId].fullName, dateLabel: newEntry.label,
        refId: refId, submittedAt: now, submittedAtLabel: d._isNew ? new Date(now).toLocaleString('th-TH') : d.submittedAtLabel
      });
      delete record._isNew; delete record._originalRefId; delete record._originalDateId;
      try {
        await window.storage.set('application:' + refId, JSON.stringify(record), true);
        state.editing = null; state.screen = 'admin'; state.error='';
        await loadAdminRows();
      } catch(e){ state.error = 'บันทึกไม่สำเร็จ กรุณาลองใหม่'; render(); }
    },
    deleteApplicant: async function(refId){
      if (!confirm('ยืนยันการลบผู้สมัครรายนี้?')) return;
      var row = state.adminRows.filter(function(r){ return r.refId === refId; })[0];
      try {
        if (row){
          var entries = await refreshDateConfig(row.courseId);
          var entry = findEntry(entries, row.dateId);
          if (entry){ entry.used = Math.max(0, (entry.used||0) - 1); await saveDateConfig(row.courseId, entries); }
        }
        await window.storage.delete('application:' + refId, true);
        await loadAdminRows();
      } catch(e){ state.error = 'ลบไม่สำเร็จ'; render(); }
    },

    exportCSV: function(isSuper){
      var rows = state.adminRows;
      if (!rows.length) return;
      var headers, lines;
      if (!isSuper){
        headers = ['หลักสูตร','วันรุ่นที่สมัคร','คำนำหน้า','ชื่อ','สกุล'];
        lines = [headers.join(',')];
        rows.forEach(function(r){
          var line = [r.courseTitle, r.dateLabel, (r.title==='อื่นๆ'?r.titleOther:r.title), r.firstName, r.lastName]
            .map(function(v){ return '"'+(v==null?'':String(v)).replace(/"/g,'""')+'"'; });
          lines.push(line.join(','));
        });
      } else {
        headers = ['วันที่สมัคร','อ้างอิง','หลักสูตร','วันรุ่น','คำนำหน้า','ชื่อ','สกุล','วันเกิด','ช่วงอายุ','เบอร์โทร','อีเมล','การศึกษา','อาชีพ','เลขบัตรประชาชน','บ้านเลขที่','ถนน','ตำบล','อำเภอ','จังหวัด','รหัสไปรษณีย์','โรคประจำตัว','รายละเอียดโรค'];
        lines = [headers.join(',')];
        rows.forEach(function(r){
          var line = [
            r.submittedAtLabel, r.refId, r.courseTitle, r.dateLabel,
            (r.title==='อื่นๆ'?r.titleOther:r.title), r.firstName, r.lastName, r.birthdate, r.ageRange,
            r.phone, r.email, r.education, r.occupation, r.nationalId,
            r.houseNo, r.street, r.subdistrict, r.district, r.province, r.zip,
            (r.hasCondition==='yes'?'มี':'ไม่มี'), (r.conditionDetail||'')
          ].map(function(v){ return '"'+(v==null?'':String(v)).replace(/"/g,'""')+'"'; });
          lines.push(line.join(','));
        });
      }
      var csv = '\uFEFF' + lines.join('\r\n');
      var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'panya-applications.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  };

  render();
})();
</script>
</body>
</html>
